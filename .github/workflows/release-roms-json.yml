name: Release roms.json

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag name for the release, for example v1.0.0"
        required: true
      release_name:
        description: "Optional release title"
        required: false
      prerelease:
        description: "Mark this release as a prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare release asset
        run: cp resources/roms.json roms.json

      - name: Determine release metadata
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag_name="${{ inputs.tag_name }}"
            release_name="${{ inputs.release_name }}"
            prerelease="${{ inputs.prerelease }}"
          else
            tag_name="${GITHUB_REF_NAME}"
            release_name=""
            prerelease="false"
          fi

          if [[ -z "${release_name}" ]]; then
            release_name="roms.json ${tag_name}"
          fi

          {
            echo "tag_name=${tag_name}"
            echo "release_name=${release_name}"
            echo "prerelease=${prerelease}"
          } >> "${GITHUB_OUTPUT}"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.meta.outputs.tag_name }}
          RELEASE_NAME: ${{ steps.meta.outputs.release_name }}
          PRERELEASE: ${{ steps.meta.outputs.prerelease }}
        shell: bash
        run: |
          prerelease_flag=""
          if [[ "${PRERELEASE}" == "true" ]]; then
            prerelease_flag="--prerelease"
          fi

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release upload "${TAG_NAME}" roms.json --clobber
          else
            gh release create "${TAG_NAME}" roms.json \
              --title "${RELEASE_NAME}" \
              --target "${GITHUB_SHA}" \
              --generate-notes \
              ${prerelease_flag}
          fi
